<app-modal
  [open]="open"
  [title]="bill ? 'Edit Bill' : 'New Bill'"
  (closed)="closed.emit()">

  <div class="form">
    <div class="field">
      <label class="label-sm">Name</label>
      <input class="input-field" [(ngModel)]="name" name="name"
             placeholder="e.g. Netflix, ChatGPT" />
    </div>

    <div class="form-grid">
      <div class="field">
        <label class="label-sm">Amount</label>
        <div class="amount-wrap">
          <span class="curr">$</span>
          <input class="input-field amount-input" type="number" step="0.01"
                 [(ngModel)]="amount" name="amount" placeholder="0.00" />
        </div>
      </div>
      <div class="field">
        <label class="label-sm">Frequency</label>
        <select class="input-field" [(ngModel)]="frequency" name="frequency">
          @for (f of frequencies; track f.value) {
            <option [value]="f.value">{{ f.label }}</option>
          }
        </select>
      </div>
    </div>

    <div class="field">
      <label class="label-sm">Next due date</label>
      <input class="input-field" type="date"
             [(ngModel)]="nextDueDate" name="nextDueDate" />
    </div>

    <div class="form-grid">
      <div class="field">
        <label class="label-sm">Account</label>
        <select class="input-field" [(ngModel)]="accountId" name="accountId">
          <option value="">No account</option>
          @for (a of activeAccounts(); track a.id) {
            <option [value]="a.id">{{ a.icon }} {{ a.name }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label class="label-sm">Category</label>
        <select class="input-field" [(ngModel)]="categoryId" name="categoryId">
          <option value="">No category</option>
          @for (c of expenseCategories(); track c.id) {
            <option [value]="c.id">{{ c.icon }} {{ c.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="field">
      <label class="label-sm">Icon</label>
      <div class="icon-picker">
        @for (opt of iconOptions; track opt) {
          <button type="button" class="icon-opt"
                  [class.active]="icon === opt"
                  (click)="icon = opt">{{ opt }}</button>
        }
      </div>
    </div>

    <div class="autopay-row">
      <div>
        <div class="autopay-label">Autopay enabled</div>
        <div class="autopay-sub">Bill is paid automatically each cycle</div>
      </div>
      <button type="button" class="toggle"
              [class.on]="autopayEnabled"
              (click)="autopayEnabled = !autopayEnabled"></button>
    </div>

    <div class="field">
      <label class="label-sm">Notes (optional)</label>
      <input class="input-field" [(ngModel)]="notes" name="notes"
             placeholder="Any notes…" />
    </div>

    <div class="actions">
      @if (bill) {
        <button type="button" class="btn-danger"
                (click)="deleteRequested.emit()">Delete</button>
      }
      <div class="actions-right">
        <button type="button" class="btn-ghost"
                (click)="closed.emit()">Cancel</button>
        <button type="button" class="btn-primary"
                [disabled]="submitting()"
                (click)="save()">
          {{ bill ? 'Save changes' : 'Add bill' }}
        </button>
      </div>
    </div>
  </div>
</app-modal>
