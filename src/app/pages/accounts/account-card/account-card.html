<div class="card" (click)="edit.emit(account)">
  <div class="card-head">
    <div class="card-emoji">{{ account.icon || '🏦' }}</div>
    <span class="card-type">{{ typeLabel }}</span>
  </div>

  <div class="card-name">{{ account.name }}</div>

  @if (account.institution || account.last4) {
    <div class="card-meta">
      @if (account.institution) { {{ account.institution }} }
      @if (account.last4) {
        <span class="card-dot">·</span> •••• {{ account.last4 }}
      }
    </div>
  }

  <div class="card-balance" [class.negative]="isDebt">
    {{ isDebt ? '−' : '' }}{{ displayBalance }}
  </div>

  <div class="card-label">{{ isDebt ? 'Owed' : 'Balance' }}</div>
</div>
