<div class="page">
  <div class="page-head">
    <h1>Settings</h1>
    <p class="sub">Manage your account and data</p>
  </div>

  <div class="settings-list">
    <div class="settings-section">
      <div class="settings-section-title">Data</div>
      <div class="settings-row" (click)="navigate('/import')">
        <div class="settings-icon">📥</div>
        <div class="settings-info">
          <div class="settings-label">Import from Notion</div>
          <div class="settings-sub">Import transactions from Notion CSV exports</div>
        </div>
        <div class="settings-arrow">›</div>
      </div>
    </div>
  </div>
</div>
