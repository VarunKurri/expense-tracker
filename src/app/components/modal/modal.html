@if (open) {
  <div class="backdrop" (click)="onBackdropClick($event)">
    <div class="modal glass-strong" [class.sm]="size === 'sm'" [class.lg]="size === 'lg'">
      <header class="modal-header">
        <h2>{{ title }}</h2>
        <button class="close-btn" (click)="close()" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 4l12 12M16 4L4 16"/>
          </svg>
        </button>
      </header>
      <div class="modal-body">
        <ng-content />
      </div>
    </div>
  </div>
}
